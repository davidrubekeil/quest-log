<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEE6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Quest-Log">
  <title>Quest-Log</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-title">Quest-Log</div>
    <div class="app-date" id="headerDate"></div>
  </header>

  <main class="view" id="view"></main>

  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="quests">
      <span class="tab-num">01</span><span>Quests</span>
    </button>
    <button class="tab" data-tab="lists">
      <span class="tab-num">02</span><span>Listen</span>
    </button>
  </nav>

  <script src="./icons.js"></script>
  <script src="./app.js"></script>
</body>
</html>
